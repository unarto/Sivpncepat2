name: Build libssh2 Android

on:
  workflow_dispatch:
  push:
    paths:
      - 'compile-libssh2.sh'
      - 'app/src/main/cpp/**'
      - 'libssh2/**'
      - '.github/workflows/buildlissh.yml'
  pull_request:
    paths:
      - 'compile-libssh2.sh'
      - 'app/src/main/cpp/**'
      - 'libssh2/**'
      - '.github/workflows/buildlissh.yml'

jobs:
  build-libssh2:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3.2.0
        with:
          log-accepted-android-sdk-licenses: false
          cmdline-tools-version: '13114758'
          packages: 'platform-tools'

      - name: Install NDK and CMake
        run: |
          echo "y" | sdkmanager --channel=0 --install "ndk;28.2.13676358" "cmake;3.22.1"
          echo "NDK_HOME=$ANDROID_HOME/ndk/28.2.13676358" >> "$GITHUB_ENV"
          echo "$ANDROID_HOME/cmake/3.22.1/bin" >> "$GITHUB_PATH"

      - name: Build libssh2 JNI library
        run: |
          chmod +x compile-libssh2.sh
          ./compile-libssh2.sh

      - name: Upload libssh2 JNI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: libssh2-android-jniLibs
          path: app/src/main/jniLibs/**/libssh.so
          if-no-files-found: error
          retention-days: 7
